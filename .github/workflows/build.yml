name: Build IE Launcher

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller pywin32

      - name: Build exe
        run: pyinstaller --onefile --windowed --name IELauncher ielauncher.py

      - name: Build installer
        run: iscc "/DAppVersion=${{ github.event.inputs.version }}" installer.iss

      - name: Create release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "IE Launcher v${{ github.event.inputs.version }}"
          files: |
            Output/IELauncher-Setup.exe
            dist/IELauncher.exe
