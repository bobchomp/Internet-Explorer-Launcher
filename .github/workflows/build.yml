name: Build IE Launcher

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name IELauncher ielauncher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IELauncher
          path: dist/IELauncher.exe
